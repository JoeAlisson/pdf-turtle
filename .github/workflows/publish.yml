name: Publish Image
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  test-and-build:
    uses: ./.github/workflows/tests.yml
  publish-container:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: lowercase github.repository
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY@L}" >> ${GITHUB_ENV}
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Github Packages
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docker image with playground
        uses: docker/build-push-action@v7
        with:
          context: ./
          tags: |
            ${{ vars.DOCKERHUB_REPOSITORY }}:latest
            ${{ vars.DOCKERHUB_REPOSITORY }}:${{ github.ref_name }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          push: true
